name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    name: Publish to npm
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Read package metadata
        id: package
        run: |
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Check npm version
        id: npm
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          set +e
          output="$(npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version 2>&1)"
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "Package ${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on npm."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if echo "$output" | grep -q 'E404'; then
            echo "Package ${PACKAGE_NAME}@${PACKAGE_VERSION} is not on npm yet."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$output"
          exit "$status"

      - name: Check GitHub tag
        if: steps.npm.outputs.should_publish == 'true'
        env:
          RELEASE_TAG: ${{ steps.package.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists but npm version is missing. Resolve manually."
            exit 1
          fi

      - name: Install dependencies
        if: steps.npm.outputs.should_publish == 'true'
        run: npm ci

      - name: Build package
        if: steps.npm.outputs.should_publish == 'true'
        run: npm run build

      - name: Verify package contents
        if: steps.npm.outputs.should_publish == 'true'
        run: npm pack --dry-run

      - name: Publish to npm
        if: steps.npm.outputs.should_publish == 'true'
        run: npm publish --provenance --access public

      - name: Create GitHub release
        if: steps.npm.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.package.outputs.tag }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: gh release create "${RELEASE_TAG}" --target "${RELEASE_SHA}" --generate-notes --title "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}"
